<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        @import url('https://cdnjs.cloudflare.com/ajax/libs/inter/3.19.3/inter.css');

        :root {
            --primary: #15E99A;
            --secondary: #8B5CF6;
            --bg: #181924;
            --text: #F8FAFC;
            --text-secondary: #CBD5E1;
        }

        body, html {
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background: #242638;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            position: relative;
        }

        /* Top-left green glow */
        body::before {
            content: '';
            position: fixed;
            top: -80px;
            left: -80px;
            width: 320px;
            height: 320px;
            background: rgba(21, 233, 154, 0.10);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        /* Bottom-right violet glow */
        body::after {
            content: '';
            position: fixed;
            bottom: 0;
            right: 0;
            width: 240px;
            height: 240px;
            background: rgba(139, 92, 246, 0.05);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: appear 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes appear {
            0% {
                opacity: 0;
                transform: scale(0.96);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            width: 180px;
            height: auto;
            margin: 2rem 0;
            animation: pulse 6s ease-in-out infinite;
            filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.2));
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1) translateY(0);
                filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.2));
            }
            50% {
                transform: scale(1.05) translateY(-10px);
                filter: drop-shadow(0 16px 32px rgba(99, 102, 241, 0.3));
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s backwards;
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            animation: loading 2s ease-in-out infinite;
            border-radius: 2px;
        }

        @keyframes loading {
            0% {
                width: 0;
                opacity: 1;
            }
            50% {
                width: 100%;
                opacity: 0.5;
            }
            100% {
                width: 0;
                opacity: 1;
            }
        }

        .loading-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: dotPulse 1.4s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { transform: scale(0.6); opacity: 0.4; }
            50% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/kaleidoswap-pictogram.svg" alt="KaleidoSwap Logo" class="logo">
        <div class="loading-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="loading-text">
                Initializing
                <div class="loading-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
